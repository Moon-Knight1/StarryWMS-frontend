<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="renderer" content="webkit">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="icon" href="/star-wms-logo.svg">
  <title>%VITE_APP_TITLE%</title>
  <!--[if lt IE 11]><script>window.location.href='/html/ie.html';</script><![endif]-->
  <style>
    html,
    body,
    #app {
      height: 100%;
      margin: 0px;
      padding: 0px;
    }

    .chromeframe {
      margin: 0.2em 0;
      background: #ccc;
      color: #000;
      padding: 0.2em 0;
    }

    /* ========== Loading Screen ========== */
    #loader-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 999999;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    /* ---- Panel backdrops (StarryWMS brand: deep midnight + subtle warmth) ---- */
    #loader-wrapper .loader-section {
      position: fixed;
      top: 0;
      width: 51%;
      height: 100%;
      background: #0c1018;
      z-index: 1000;
      transform: translateX(0);
    }

    #loader-wrapper .loader-section.section-left {
      left: 0;
      border-right: 1px solid rgba(200, 149, 108, 0.06);
      background: radial-gradient(ellipse at 90% 50%, rgba(200, 149, 108, 0.03) 0%, transparent 60%),
                  #0c1018;
    }

    #loader-wrapper .loader-section.section-right {
      right: 0;
      background: radial-gradient(ellipse at 10% 50%, rgba(122, 172, 204, 0.03) 0%, transparent 60%),
                  #0e1318;
    }

    /* ---- Central loader container ---- */
    #loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1001;
      position: relative;
    }

    /* ---- Box icon (warehouse package theme, StarryWMS brand) ---- */
    .loader-box {
      width: 72px;
      height: 72px;
      position: relative;
      animation: boxFloat 2.6s ease-in-out infinite;
    }

    /* The box body */
    .loader-box-body {
      width: 64px;
      height: 64px;
      background: rgba(20, 28, 38, 0.6);
      border: 2px solid rgba(200, 149, 108, 0.3);
      border-radius: 10px;
      position: absolute;
      top: 4px;
      left: 4px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(200, 149, 108, 0.06);
    }

    /* Cross tape on the box (amber-tinted) */
    .loader-box-tape-h,
    .loader-box-tape-v {
      position: absolute;
      background: rgba(200, 149, 108, 0.18);
      border-radius: 2px;
    }

    .loader-box-tape-h {
      width: 64px;
      height: 10px;
      top: 50%;
      left: 4px;
      transform: translateY(-50%);
    }

    .loader-box-tape-v {
      width: 10px;
      height: 64px;
      left: 50%;
      top: 4px;
      transform: translateX(-50%);
    }

    /* Orbiting dot — star-amber glow */
    .loader-orbiter {
      position: absolute;
      width: 72px;
      height: 72px;
      top: 0;
      left: 0;
      animation: orbitSpin 2s linear infinite;
    }

    .loader-orbiter::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      background: #c8956c;
      border-radius: 50%;
      top: -4px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 16px rgba(200, 149, 108, 0.5), 0 0 32px rgba(200, 149, 108, 0.2);
    }

    /* ---- Progress bar (star-amber gradient) ---- */
    .loader-progress {
      width: 200px;
      height: 3px;
      background: rgba(200, 149, 108, 0.1);
      border-radius: 10px;
      margin-top: 32px;
      overflow: hidden;
      position: relative;
    }

    .loader-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #c8956c, #d8b391, #c8956c);
      background-size: 200% 100%;
      border-radius: 10px;
      animation: progressPulse 2s ease-in-out infinite, shimmer 2s linear infinite;
      width: 60%;
    }

    /* ---- Loading text (star-mist) ---- */
    #loader-wrapper .load_title {
      font-family: 'Open Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #dce4ec;
      font-size: 17px;
      width: 100%;
      text-align: center;
      z-index: 1001;
      position: relative;
      margin-top: 20px;
      letter-spacing: 1px;
      font-weight: 500;
    }

    .load_title .dots {
      display: inline-block;
      width: 24px;
      text-align: left;
    }

    .load_title .dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #c8956c;
      margin: 0 2px;
      animation: dotBounce 1.4s ease-in-out infinite;
    }

    .load_title .dots span:nth-child(1) { animation-delay: 0s; }
    .load_title .dots span:nth-child(2) { animation-delay: 0.16s; }
    .load_title .dots span:nth-child(3) { animation-delay: 0.32s; }

    /* ---- Brand subtitle (star-ice) ---- */
    .loader-brand {
      font-family: 'Open Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #7aaccc;
      font-size: 12px;
      text-align: center;
      z-index: 1001;
      position: relative;
      margin-top: 6px;
      letter-spacing: 3px;
      opacity: 0.6;
    }

    /* ---- Subtle star accents (Starry brand) ---- */
    .loader-section::after {
      content: "";
      position: absolute;
      width: 2px;
      height: 2px;
      background: #c8956c;
      border-radius: 50%;
      opacity: 0;
      animation: starTwinkle 3s ease-in-out infinite;
      box-shadow: 0 0 6px rgba(200, 149, 108, 0.4);
    }

    .section-left::after {
      top: 22%;
      right: 60px;
      animation-delay: 0s;
    }

    .section-right::after {
      top: 68%;
      left: 80px;
      animation-delay: 1.5s;
    }

    /* ========== Keyframes ========== */

    @keyframes boxFloat {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }
      25% {
        transform: translateY(-8px) rotate(1deg);
      }
      50% {
        transform: translateY(0) rotate(0deg);
      }
      75% {
        transform: translateY(-8px) rotate(-1deg);
      }
    }

    @keyframes orbitSpin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes progressPulse {
      0%, 100% {
        width: 30%;
      }
      50% {
        width: 75%;
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }
      100% {
        background-position: 200% 0;
      }
    }

    @keyframes dotBounce {
      0%, 80%, 100% {
        transform: translateY(0);
        opacity: 0.4;
      }
      40% {
        transform: translateY(-8px);
        opacity: 1;
      }
    }

    @keyframes starTwinkle {
      0%, 100% {
        opacity: 0;
        transform: scale(0.6);
      }
      50% {
        opacity: 0.7;
        transform: scale(1.4);
      }
    }

    /* ========== Loaded state transitions ========== */

    .loaded #loader-wrapper .loader-section.section-left {
      transform: translateX(-100%);
      transition: all 0.7s 0.3s cubic-bezier(0.645, 0.045, 0.355, 1.000);
    }

    .loaded #loader-wrapper .loader-section.section-right {
      transform: translateX(100%);
      transition: all 0.7s 0.3s cubic-bezier(0.645, 0.045, 0.355, 1.000);
    }

    .loaded #loader {
      opacity: 0;
      transition: all 0.25s ease-out;
    }

    .loaded #loader-wrapper {
      visibility: hidden;
      transform: translateY(-100%);
      transition: all 0.3s 0.8s ease-out;
    }

    .no-js #loader-wrapper {
      display: none;
    }

    .no-js h1 {
      color: #222222;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="loader-wrapper">
      <div class="loader-section section-left"></div>
      <div class="loader-section section-right"></div>
      <div id="loader">
        <div class="loader-box">
          <div class="loader-box-body"></div>
          <div class="loader-box-tape-h"></div>
          <div class="loader-box-tape-v"></div>
          <div class="loader-orbiter"></div>
        </div>
        <div class="loader-progress">
          <div class="loader-progress-fill"></div>
        </div>
        <div class="load_title">
          正在加载系统资源
          <span class="dots">
            <span></span><span></span><span></span>
          </span>
        </div>
        <div class="loader-brand">STARRY WMS</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
